workflows:
  development-build:
    name: Unsigned Development Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      vars:
        XCODE_SCHEME: "CoReplyApp"
        XCODE_PROJECT: "CoReply.xcodeproj"
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install XcodeGen
        script: |
          brew install xcodegen
      - name: Generate Xcode project
        script: |
          cd $CM_BUILD_DIR/CoReply
          xcodegen generate
      - name: Resolve SPM dependencies
        script: |
          cd $CM_BUILD_DIR/CoReply
          xcodebuild -resolvePackageDependencies \
            -scheme $XCODE_SCHEME \
            -project $XCODE_PROJECT
      - name: Build and Archive (No signing)
        script: |
          cd $CM_BUILD_DIR/CoReply
          xcodebuild archive \
            -scheme $XCODE_SCHEME \
            -project $XCODE_PROJECT \
            -destination 'generic/platform=iOS' \
            -archivePath ./build/CoReply.xcarchive \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            EXPANDED_CODE_SIGN_IDENTITY=""
      - name: Package Unsigned IPA
        script: |
          cd $CM_BUILD_DIR/CoReply
          mkdir -p build/ipa
          cp -r build/CoReply.xcarchive/Products/Applications/CoReplyApp.app build/ipa/
          cd build/ipa
          mkdir -p Payload
          mv CoReplyApp.app Payload/
          zip -r CoReply-unsigned.ipa Payload/
          mv CoReply-unsigned.ipa ../
    artifacts:
      - CoReply/build/CoReply-unsigned.ipa
    publishing:
      email:
        recipients:
          - developer@example.com
        notify:
          success: true
          failure: true

  production-build:
    name: Production Build (App Store)
    max_build_duration: 90
    instance_type: mac_mini_m2
    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: 'v*'
          include: true
    integrations:
      app_store_connect: codemagic_api_key
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.abhinand.coreply
      vars:
        XCODE_SCHEME: "CoReplyApp"
        XCODE_PROJECT: "CoReply.xcodeproj"
        BUNDLE_ID: "com.abhinand.coreply"
        APP_STORE_APPLE_ID: "YOUR_APP_STORE_APPLE_ID"
      xcode: latest
    scripts:
      - name: Install XcodeGen
        script: |
          brew install xcodegen
      - name: Generate Xcode project
        script: |
          cd $CM_BUILD_DIR/CoReply
          xcodegen generate
      - name: Resolve SPM dependencies
        script: |
          cd $CM_BUILD_DIR/CoReply
          xcodebuild -resolvePackageDependencies \
            -scheme $XCODE_SCHEME \
            -project $XCODE_PROJECT
      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files $BUNDLE_ID \
            --platform IOS \
            --type IOS_APP_STORE \
            --create
          # Also fetch keyboard extension signing files
          app-store-connect fetch-signing-files com.abhinand.coreply.keyboard \
            --platform IOS \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Increment build number
        script: |
          cd $CM_BUILD_DIR/CoReply
          BUILD_NUMBER=$(app-store-connect get-latest-build-number $APP_STORE_APPLE_ID --platform IOS || echo "0")
          NEW_BUILD=$((BUILD_NUMBER + 1))
          agvtool new-version -all $NEW_BUILD
      - name: Build App Store IPA
        script: |
          cd $CM_BUILD_DIR/CoReply
          xcodebuild archive \
            -scheme $XCODE_SCHEME \
            -project $XCODE_PROJECT \
            -destination 'generic/platform=iOS' \
            -archivePath ./build/CoReply.xcarchive \
            -configuration Release \
            | xcpretty
          xcodebuild -exportArchive \
            -archivePath ./build/CoReply.xcarchive \
            -exportOptionsPlist ./ExportOptions-appstore.plist \
            -exportPath ./build/appstore-ipa
    artifacts:
      - CoReply/build/appstore-ipa/*.ipa
      - CoReply/build/CoReply.xcarchive
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
        beta_groups:
          - Internal Testers
      email:
        recipients:
          - developer@example.com
        notify:
          success: true
          failure: true
