name: CoReply
options:
  bundleIdPrefix: com.abhinand
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.4"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    ENABLE_BITCODE: NO
    DEBUG_INFORMATION_FORMAT: dwarf-with-dsym

packages:
  Supabase:
    url: https://github.com/supabase-community/supabase-swift
    from: "2.0.0"
  RevenueCat:
    url: https://github.com/RevenueCat/purchases-ios
    from: "4.0.0"

targets:
  CoReplyApp:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: CoReplyApp
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.abhinand.coreply
        DEVELOPMENT_TEAM: $(DEVELOPMENT_TEAM)
        INFOPLIST_FILE: CoReplyApp/Resources/Info.plist
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
    entitlements:
      path: CoReplyApp/CoReplyApp.entitlements
    dependencies:
      - package: Supabase
        product: Supabase
      - package: RevenueCat
        product: RevenueCat
      - target: CoReplyKeyboard
        embed: true
    info:
      path: CoReplyApp/Resources/Info.plist
      properties:
        CFBundleDisplayName: CoReply AI
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        NSCameraUsageDescription: Used for OCR mode to analyze screenshots
        NSPhotoLibraryUsageDescription: Used for OCR mode to analyze screenshots
        UILaunchScreen:
          UIColorName: ""
          UIImageName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations: {}

  CoReplyKeyboard:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: CoReplyKeyboard
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.abhinand.coreply.keyboard
        DEVELOPMENT_TEAM: $(DEVELOPMENT_TEAM)
        INFOPLIST_FILE: CoReplyKeyboard/Info.plist
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: KEYBOARD_EXTENSION
    entitlements:
      path: CoReplyKeyboard/CoReplyKeyboard.entitlements
    info:
      path: CoReplyKeyboard/Info.plist
      properties:
        NSExtension:
          NSExtensionAttributes:
            IsASCIICapable: false
            PrefersRightToLeft: false
            PrimaryLanguage: en-US
            RequestsOpenAccess: true
          NSExtensionPointIdentifier: com.apple.keyboard-service
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).KeyboardViewController

  CoReplyTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: CoReplyTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.abhinand.coreply.tests
    dependencies:
      - target: CoReplyApp
